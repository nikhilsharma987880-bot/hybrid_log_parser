# aura_rules.conf - Cyber Aura Dynamic Rules Engine

# 1. इनबाउंड नेटवर्क लॉग्स और उनपर एक्शन (eBPF / Firewall)
INBOUND_LOG | UNION SELECT | BLOCK_IP_UFW
INBOUND_LOG | ../etc/passwd | BLOCK_IP_UFW
INBOUND_LOG | HACK_ATTEMPT | BLOCK_IP_UFW

# 2. फाइल इंटीग्रिटी मॉनिटर (FIM) एक्शन्स (ChaCha20 Engine ट्रिगर)
FILE_MONITOR | /var/www/html/index.php | ENCRYPT_CHACHA20
FILE_MONITOR | /etc/shadow | KILL_PROCESS_PID

# 3. कर्नल लेवल स्टेटिक ब्लॉक्स (Direct eBPF Injection)
BLOCK_IP=192.168.1.100
BLOCK_IP=10.0.0.55
